name: tests

on:
  push:
    branches: [main]
    tags: ["v*"] # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} py${{ matrix.python-version }} ${{ matrix.resolution }}
    runs-on: ${{ matrix.platform }}
    env:
      # disable resyncing on uv run
      UV_NO_SYNC: "1"
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        resolution: [highest, lowest-direct]

    steps:
      - uses: actions/checkout@v6
      # The Ubuntu runner image ships broken Microsoft apt repos whose signature
      # is periodically invalid ("Clearsigned file isn't valid, got 'NOSPLIT'"),
      # which fails the apt-get update inside setup-qt-libs. We don't need them.
      - name: Remove broken Microsoft apt sources (ubuntu runner image)
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources
      - uses: tlambert03/setup-qt-libs@v1

      # The tree view renders via fastplotlib/pygfx/wgpu, which needs a graphics
      # adapter. Headless Linux runners have no GPU, so install Mesa's software
      # Vulkan driver (lavapipe); wgpu then finds an adapter under xvfb instead of
      # aborting (SIGABRT in request_adapter). macOS (Metal) / Windows (DX12) are fine.
      - name: Install software Vulkan (lavapipe) for headless wgpu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libgl1-mesa-dri

      - name: Set up Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev --group testing --resolution ${{ matrix.resolution }}

      - name: Set Windows resolution
        if: runner.os == 'Windows'
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force
        shell: powershell

      - name: Install Windows OpenGL
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/pyvista/gl-ci-helpers.git
          powershell gl-ci-helpers/appveyor/install_opengl.ps1
          if (Test-Path -Path "C:\Windows\system32\opengl32.dll" -PathType Leaf) {Exit 0} else {Exit 1}
        shell: powershell

      - name: Test
        uses: aganders3/headless-gui@v2
        with:
          run: uv run pytest --color=yes --cov=motile_tracker --cov-report=xml --cov-report=term-missing .

      - name: Coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: funkelab/motile_tracker
