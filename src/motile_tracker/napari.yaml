name: motile-tracker
display_name: Motile Tracker
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/manifest.html for valid categories
categories: ["Utilities"]
contributions:
  commands:
    - id: motile-tracker.main_app
      python_name: motile_tracker.application_menus.main_app:MainAppWidget
      title: "Open all menus and the lineage view"
    - id: motile-tracker.getting_started
      python_name: motile_tracker.application_menus.main_app:GettingStartedWidget
      title: "Open Getting started menu"
    - id: motile-tracker.tracking
      python_name: motile_tracker.application_menus.main_app:TrackingWidget
      title: "Open Tracking menu"
    - id: motile-tracker.tracks_list
      python_name: motile_tracker.application_menus.main_app:TracksListWidget
      title: "Open Tracks List menu"
    - id: motile-tracker.editing_selection
      python_name: motile_tracker.application_menus.main_app:EditingSelectionWidget
      title: "Open Editing && Selection menu"
    - id: motile-tracker.visualization
      python_name: motile_tracker.application_menus.main_app:VisualizationWidget
      title: "Open Visualization menu"
    - id: motile-tracker.groups
      python_name: motile_tracker.application_menus.main_app:GroupsWidget
      title: "Open Groups menu"
    - id: motile-tracker.table
      python_name: motile_tracker.application_menus.main_app:TableWidget
      title: "Open Table menu"
    - id: motile-tracker.lineage_view
      python_name: motile_tracker.application_menus.main_app:LineageViewWidget
      title: "Open Lineage View menu"
    - id: motile-tracker.solve
      python_name: motile_tracker.motile.backend.solve:solve
      title: "Run motile tracking (backend only)"
    - id: motile-tracker.Fluo_N2DL_HeLa
      python_name: motile_tracker.example_data:Fluo_N2DL_HeLa
      title: "Load Fluo-N2DL-HeLa tracking dataset"
    - id: motile-tracker.Fluo_N2DL_HeLa_crop
      python_name: motile_tracker.example_data:Fluo_N2DL_HeLa_crop
      title: "Load Fluo-N2DL-HeLa tracking dataset (crop)"
    - id: motile-tracker.Mouse_Embryo_Membrane
      python_name: motile_tracker.example_data:Mouse_Embryo_Membrane
      title: "Load Mouse Embryo_Membrane tracking dataset"
  widgets:
    - command: motile-tracker.main_app
      display_name: Open all widgets
    - command: motile-tracker.getting_started
      display_name: Getting started
    - command: motile-tracker.tracking
      display_name: Tracking
    - command: motile-tracker.tracks_list
      display_name: Tracks List
    - command: motile-tracker.editing_selection
      display_name: Editing & Selection
    - command: motile-tracker.visualization
      display_name: Visualization
    - command: motile-tracker.groups
      display_name: Groups
    - command: motile-tracker.table
      display_name: Table
    - command: motile-tracker.lineage_view
      display_name: Lineage View
  sample_data:
    - command: motile-tracker.Fluo_N2DL_HeLa
      key: "Fluo-N2DL-HeLa"
      display_name: "Fluo-N2DL-HeLa (2D)"
    - command: motile-tracker.Fluo_N2DL_HeLa_crop
      key: "Fluo-N2DL-HeLa-crop"
      display_name: "Fluo-N2DL-HeLa crop (2D)"
    - command: motile-tracker.Mouse_Embryo_Membrane
      key: "Mouse_Embryo_Membrane"
      display_name: "Mouse Embryo Membranes (3D)"
